name: janna_services
description: "Janna October Services - residents' services directory."
publish_to: 'none'

# version: <semantic-version>+<build-number>
# Increment the build number (after the +) for every Play upload, even for
# the same semantic version. Examples:
#   1.0.0+1   first release
#   1.0.1+2   patch release
#   1.1.0+3   minor release
#   2.0.0+4   major release
version: 2.0.2+7

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.1

  # Local storage for favorites
  shared_preferences: ^2.2.3

  # Images
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # Phone / WhatsApp / Maps
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

  # Launcher icon generator. Drop a 1024x1024 PNG at
  # assets/icon/app_icon.png and run:
  #   dart run flutter_launcher_icons
  # to regenerate the Android mipmap-* set from a single source image.
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
