name: janna_services
description: "Janna October Services - residents' services directory."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.1

  # Local storage for favorites
  shared_preferences: ^2.2.3

  # Images
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # Phone / WhatsApp / Maps
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
